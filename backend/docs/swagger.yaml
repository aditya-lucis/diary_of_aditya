  # ==================== DASHBOARD ====================
  /dashboard/overview:
    get:
      tags:
        - Dashboard
      summary: Get dashboard overview
      responses:
        '200':
          description: Dashboard overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_projects:
                    type: integer
                  active_projects:
                    type: integer
                  total_clients:
                    type: integer
                  pending_invoices:
                    type: integer
                  total_revenue:
                    type: number
                    format: float
                  total_expenses:
                    type: number
                    format: float

  /dashboard/project/{project_id}/analytics:
    get:
      tags:
        - Dashboard
      summary: Get project analytics
      description: Burn rate analysis and early warning system
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Project analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  project_id:
                    type: string
                    format: uuid
                  budget:
                    type: number
                    format: float
                  actual_cost:
                    type: number
                    format: float
                  burn_rate_percentage:
                    type: number
                    format: float
                  progress_percentage:
                    type: number
                    format: float
                  is_over_budget:
                    type: boolean
                  warning_level:
                    type: string
                    enum: [Normal, Warning, Critical]
                  estimated_completion_date:
                    type: string
                    format: date
                  issue_hours_logged:
                    type: number
                    format: float

# ==================== COMPONENTS ====================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string

    Service:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
          example: SRV-01
        name:
          type: string
          example: Web App Development
        billing_method:
          type: string
          enum: [Hourly, Fixed, Retainer]
        base_rate:
          type: number
          format: float
        created_at:
          type: string
          format: date-time

    ServiceCreate:
      type: object
      required:
        - code
        - name
        - billing_method
        - base_rate
      properties:
        code:
          type: string
        name:
          type: string
        billing_method:
          type: string
          enum: [Hourly, Fixed, Retainer]
        base_rate:
          type: number
          format: float

    Resource:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        role:
          type: string
          enum: [PM, Backend, Frontend, UI, UX, QA]
        man_day_rate:
          type: number
          format: float
        hourly_cost:
          type: number
          format: float
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    ResourceCreate:
      type: object
      required:
        - name
        - role
        - man_day_rate
        - hourly_cost
      properties:
        name:
          type: string
        role:
          type: string
          enum: [PM, Backend, Frontend, UI, UX, QA]
        man_day_rate:
          type: number
          format: float
        hourly_cost:
          type: number
          format: float
        is_active:
          type: boolean
          default: true

    Client:
      type: object
      properties:
        id:
          type: string
          format: uuid
        company_name:
          type: string
        pic_name:
          type: string
        pic_email:
          type: string
          format: email
        pic_phone:
          type: string
        address:
          type: string
        status:
          type: string
          enum: [Lead, Active, Inactive]
        created_at:
          type: string
          format: date-time

    ClientCreate:
      type: object
      required:
        - company_name
        - pic_name
        - pic_email
      properties:
        company_name:
          type: string
        pic_name:
          type: string
        pic_email:
          type: string
          format: email
        pic_phone:
          type: string
        address:
          type: string
        status:
          type: string
          enum: [Lead, Active, Inactive]
          default: Lead

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        client_id:
          type: string
          format: uuid
        project_code:
          type: string
          example: PRJ-2026-001
        name:
          type: string
        description:
          type: string
        complexity:
          type: string
          enum: [Low, Medium, High]
        complexity_score:
          type: number
          format: float
        total_budget:
          type: number
          format: float
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
          enum: [Draft, In Progress, On Hold, UAT, Completed, Cancelled]
        created_at:
          type: string
          format: date-time
        client:
          $ref: '#/components/schemas/Client'

    ProjectCreate:
      type: object
      required:
        - client_id
        - name
        - start_date
        - end_date
      properties:
        client_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        total_budget:
          type: number
          format: float
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          type: string
          enum: [Draft, In Progress, On Hold, UAT, Completed, Cancelled]
          default: Draft

    Milestone:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        sequence_order:
          type: integer
        percentage_weight:
          type: number
          format: float
        budget_amount:
          type: number
          format: float
        target_date:
          type: string
          format: date
        is_completed:
          type: boolean
        completed_date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time

    MilestoneCreate:
      type: object
      required:
        - title
        - sequence_order
        - percentage_weight
        - target_date
      properties:
        title:
          type: string
        description:
          type: string
        sequence_order:
          type: integer
        percentage_weight:
          type: number
          format: float
        budget_amount:
          type: number
          format: float
        target_date:
          type: string
          format: date

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        milestone_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [High, Medium, Low]
        status:
          type: string
          enum: [To-Do, In-Progress, In-Review, Done]
        estimated_hours:
          type: number
          format: float
        start_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        dependency_task_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        assigned_resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'

    TaskCreate:
      type: object
      required:
        - title
        - priority
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [High, Medium, Low]
        estimated_hours:
          type: number
          format: float
        start_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        dependency_task_id:
          type: string
          format: uuid
          nullable: true

    Timesheet:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        resource_id:
          type: string
          format: uuid
        description:
          type: string
        duration_hours:
          type: number
          format: float
        logged_date:
          type: string
          format: date
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        entry_type:
          type: string
          enum: [Manual, Timer]
        created_at:
          type: string
          format: date-time
        task:
          $ref: '#/components/schemas/Task'
        resource:
          $ref: '#/components/schemas/Resource'

    TimesheetCreate:
      type: object
      required:
        - task_id
        - resource_id
        - description
        - duration_hours
        - logged_date
      properties:
        task_id:
          type: string
          format: uuid
        resource_id:
          type: string
          format: uuid
        description:
          type: string
        duration_hours:
          type: number
          format: float
        logged_date:
          type: string
          format: date
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        entry_type:
          type: string
          enum: [Manual, Timer]
          default: Manual

    Issue:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
          nullable: true
        reported_by:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [High, Medium, Low]
        status:
          type: string
          enum: [Open, In-Progress, Resolved, Closed]
        reported_date:
          type: string
          format: date
        resolved_date:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time

    IssueCreate:
      type: object
      required:
        - title
        - priority
      properties:
        task_id:
          type: string
          format: uuid
          nullable: true
        reported_by:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [High, Medium, Low]
        status:
          type: string
          enum: [Open, In-Progress, Resolved, Closed]
          default: Open

    Invoice:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        milestone_id:
          type: string
          format: uuid
          nullable: true
        invoice_number:
          type: string
        amount:
          type: number
          format: float
        status:
          type: string
          enum: [Draft, Sent, Unpaid, Overdue, Paid]
        invoice_date:
          type: string
          format: date
        due_date:
          type: string
          format: date
        paid_date:
          type: string
          format: date
          nullable: true
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        project:
          $ref: '#/components/schemas/Project'
        client:
          $ref: '#/components/schemas/Client'

    InvoiceCreate:
      type: object
      required:
        - project_id
        - amount
        - due_date
      properties:
        project_id:
          type: string
          format: uuid
        milestone_id:
          type: string
          format: uuid
          nullable: true
        amount:
          type: number
          format: float
        due_date:
          type: string
          format: date
        notes:
          type: string

    Expense:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        category:
          type: string
          example: Cloud
        vendor:
          type: string
        amount:
          type: number
          format: float
        expense_date:
          type: string
          format: date
        description:
          type: string
        receipt_url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time

    ExpenseCreate:
      type: object
      required:
        - category
        - vendor
        - amount
        - expense_date
      properties:
        category:
          type: string
        vendor:
          type: string
        amount:
          type: number
          format: float
        expense_date:
          type: string
          format: date
        description:
          type: string
        receipt_url:
          type: string
          format: uri

    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: string